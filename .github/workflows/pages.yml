# The live demos: every push to main builds the three demo surfaces - all
# rendering WRITING.mq - and deploys them to GitHub Pages, so the tip of main
# is always live at https://cube-drone.github.io/marqueemarkup/ :
#   /         the plain HTML the omnibus renders (fetch mode, real cards)
#   /react/   the side-by-side React editor
#   /editor/  the Obsidian-style live-preview editor
# build-pages.ts builds all three into _site/ (see that script).
#
# One-time setup: repo Settings -> Pages -> Source: "GitHub Actions".

name: pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write # deploy-pages authenticates via OIDC, like everything now

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node --conditions=marquee-src scripts/build-pages.ts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
